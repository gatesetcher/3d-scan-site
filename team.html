<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Участники | 3D Рамы</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #1a1a1a; --text: #e0e0e0; }
        body { background-color: var(--dark); color: var(--text); font-family: sans-serif; margin: 0; }
        nav { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        nav a { color: var(--text); text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .member-card { 
            background: var(--card); 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center;
            transition: 0.3s;
        }
        .member-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        /* Визуальная заглушка для фото */
        .photo-placeholder {
            width: 100px; height: 100px;
            background: linear-gradient(45deg, #222, var(--gold));
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white; border: 2px solid var(--gold);
        }
        h3 { color: var(--gold); margin-bottom: 5px; }
        .role { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a> <a href="about.html">О проекте</a> <a href="team.html">Участники</a> <a href="journal.html">Журнал</a> <a href="resources.html">Ресурсы</a>
    </nav>
    <div class="container">
        <h1 style="text-align: center; color: var(--gold); margin-bottom: 50px;">Наша Команда</h1>
        
        <div class="team-grid">
            <div class="member-card">
                <div class="photo-placeholder">👨‍🏫</div>
                <span class="role">Руководитель</span>
                <h3>Петухов И.С.</h3>
            </div>
            <div class="member-card">
                <div class="photo-placeholder">🎨</div>
                <span class="role">Группа Искусствоведов</span>
                <h3>Пермина Д.С., Пирметова Д.Д., Полевая Е.С.</h3>
            </div>
            <div class="member-card">
                <div class="photo-placeholder">⚙️</div>
                <span class="role">Группа Инженеров</span>
                <h3>Варламов Е.М., Герасимова Т.Д., Дойков Ф.В.</h3>
            </div>
            <!-- Добавьте остальные карточки аналогично -->
        </div>
    </div>
</body>
</html>
